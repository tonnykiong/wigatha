<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{--bg:#0F1117;--bg2:#181C26;--bg3:#1E2330;--border:#2A2F3E;--text:#E8EAF0;--text2:#9AA0B4;--text3:#5C6278;--teal:#2DD4A0;--teal-d:#193D2F;--blue:#5B9EF0;--blue-d:#1A2740;--amber:#F0B429;--amber-d:#2A200A;--coral:#F06B5B;--coral-d:#2A1510;--purple:#9B8EF0;--purple-d:#1E1B35;--green:#6DBF67;--green-d:#182418;--gray:#6B7280;--gray-d:#1A1D22}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
.hero{padding:36px 20px 24px;max-width:740px;margin:0 auto}
.hero h1{font-size:26px;font-weight:700;letter-spacing:-.5px}
.hero p{font-size:13px;color:var(--text2);margin-top:4px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.chip{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--border);color:var(--text2);background:var(--bg2)}
.chip.blue{border-color:var(--blue);color:var(--blue);background:var(--blue-d)}
.chip.amber{border-color:var(--amber);color:var(--amber);background:var(--amber-d)}
.days{max-width:740px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:10px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.head{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none}
.head:hover{background:var(--bg3)}
.dnum{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.dmeta{flex:1}
.dmeta h3{font-size:15px;font-weight:600}
.dmeta p{font-size:12px;color:var(--text2);margin-top:2px}
.chev{font-size:11px;color:var(--text3);transition:transform .2s}
.card.open .chev{transform:rotate(180deg)}
.body{display:none;border-top:1px solid var(--border);padding:16px}
.card.open .body{display:block}
.stay{display:flex;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:14px;border:1px solid var(--border)}
.stay-ico{font-size:18px;flex-shrink:0;margin-top:1px}
.stay-name{font-size:13px;font-weight:600;color:var(--text)}
.stay-desc{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4}
.sec{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:7px;margin-bottom:14px}
.mc{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 11px}
.ml{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:2px}
.mn{font-size:13px;font-weight:600}
.md{font-size:11px;color:var(--text2);margin-top:1px;line-height:1.4}
.tl{display:flex;flex-direction:column}
.ti{display:flex;gap:10px}
.tll{display:flex;flex-direction:column;align-items:center;width:42px;flex-shrink:0}
.tt{font-size:10px;color:var(--text3);font-weight:500;text-align:center;padding-top:2px;line-height:1.2}
.td{width:7px;height:7px;border-radius:50%;margin:4px 0;flex-shrink:0}
.tln{flex:1;width:1px;background:var(--border)}
.tr{flex:1;padding-bottom:13px}
.tp{font-size:13px;font-weight:600;line-height:1.4}
.tdc{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.5}
.tips{margin-top:5px;display:flex;flex-direction:column;gap:3px}
.tip{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--bg3);line-height:1.4}
.tip.food{border-left:2px solid var(--amber);color:var(--amber)}
.tip.warn{border-left:2px solid var(--coral);color:#f09080}
.tip.info{border-left:2px solid var(--teal);color:var(--teal)}
.tip.special{border-left:2px solid var(--purple);color:var(--purple)}
.event-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:6px}
.edit-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:30px;padding:8px 16px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:100}
.ebtn{padding:5px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:var(--teal);color:#0F1117}
.ebtn.off{background:var(--border);color:var(--text2)}
.sbtn{padding:5px 14px;border-radius:20px;border:none;cursor:pointer;font-size:12px;font-weight:600;background:var(--blue);color:white;display:none}
.sbtn.show{display:inline-block}
.toast{position:fixed;top:20px;right:20px;background:var(--teal);color:#0F1117;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transform:translateY(-8px);transition:all .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1;transform:translateY(0)}
[contenteditable]:hover{background:rgba(255,255,255,.04);border-radius:4px}
[contenteditable]:focus{background:rgba(255,255,255,.07);border-radius:4px;outline:none;box-shadow:0 0 0 1px rgba(91,158,240,.4)}
@media(max-width:480px){.hero h1{font-size:20px}.mg{grid-template-columns:1fr 1fr}}

.tabs-nav{display:flex;gap:0;margin:0 20px 16px;max-width:740px;margin-left:auto;margin-right:auto;background:var(--bg2);border-radius:12px;padding:4px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:8px;border:none;background:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;border-radius:8px;transition:all .15s;font-family:'Inter',sans-serif}
.tab-btn.active{background:var(--bg3);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.tab-content{display:none;max-width:740px;margin:0 auto;padding:0 20px}
.tab-content.active{display:block}
.checklist-section{margin-bottom:20px}
.checklist-section h3{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)44;cursor:pointer}
.check-item:last-child{border-bottom:none}
.check-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal);cursor:pointer;flex-shrink:0;margin-top:2px}
.check-label{font-size:13px;color:var(--text);line-height:1.4;flex:1}
.check-label.done{text-decoration:line-through;color:var(--text3)}
.check-sub{font-size:11px;color:var(--text3);margin-top:2px}
.progress-bar{background:var(--bg3);border-radius:20px;height:6px;margin-bottom:16px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:20px;transition:width .4s}
.progress-label{font-size:12px;color:var(--text2);margin-bottom:6px}
.note-box{margin-top:6px;width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text2);font-size:12px;font-family:'Inter',sans-serif;resize:none;min-height:32px;line-height:1.5;transition:border-color .15s;overflow:hidden}
.note-box:focus{outline:none;border-color:var(--blue);color:var(--text)}
.note-box::placeholder{color:var(--text3)}
.note-toggle{font-size:11px;color:var(--text3);cursor:pointer;margin-top:4px;display:inline-flex;align-items:center;gap:4px;user-select:none}
.note-toggle:hover{color:var(--text2)}
</style>
</head>

function render(){
  const cont=document.getElementById('days');
  cont.innerHTML='';
  DAYS.forEach((d,i)=>{
    const col=COL[d.c]||COL.gray;
    const card=document.createElement('div');
    card.className='card';
    const tipHtml=(tips)=>tips.map(t=>`<div class="tip ${t.c}" contenteditable="false">${t.t}</div>`).join('');
    const tlHtml=d.tl.map((item,idx)=>{
      const last=idx===d.tl.length-1;
      const dotStyle=item.t.includes('🐉')||item.t.includes('🎆')?`background:#9B8EF0`:(`background:${col.c}`);
      return`<div class="ti">
        <div class="tll"><div class="tt">${item.t}</div><div class="td" style="${dotStyle}"></div>${!last?'<div class="tln"></div>':''}</div>
        <div class="tr">
          <div class="tp" contenteditable="false">${item.p}</div>
          ${item.d?`<div class="tdc" contenteditable="false">${item.d}</div>`:''}
          ${item.tips.length?`<div class="tips">${tipHtml(item.tips)}</div>`:''}
        </div>
      </div>`;
    }).join('');
    const mealHtml=d.meals.map(m=>`<div class="mc"><div class="ml">${m[0]}</div><div class="mn" contenteditable="false">${m[1]}</div><div class="md" contenteditable="false">${m[2]}</div></div>`).join('');
    card.innerHTML=`
      <div class="head" onclick="toggleCard(this)">
        <div class="dnum" style="background:${col.bg};color:${col.c}">D${d.n}</div>
        <div class="dmeta"><h3>${d.date} — <span contenteditable="false">${d.label}</span></h3><p>${d.tl[0]?.p||''}</p></div>
        <span class="chev">▼</span>
      </div>
      <div class="body">
        <div class="stay" style="background:${col.bg};border-color:${col.c}55">
          <div class="stay-ico">${d.stay.i}</div>
          <div><div class="stay-name" contenteditable="false">${d.stay.n}</div><div class="stay-desc" contenteditable="false">${d.stay.d}</div></div>
        </div>
        <div class="sec">Makan hari ini</div>
        <div class="mg">${mealHtml}</div>
        <div class="sec">Jadwal harian</div>
        <div class="tl">${tlHtml}</div>
      </div>`;
    cont.appendChild(card);
  });
  document.querySelector('.card')?.classList.add('open');
}

function toggleCard(h){
  const card=h.closest('.card');
  const was=card.classList.contains('open');
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('open'));
  if(!was)card.classList.add('open');
}

function toggleEdit(){
  editMode=!editMode;
  const btn=document.getElementById('eBtn');
  const sbtn=document.getElementById('sBtn');
  const est=document.getElementById('est');
  btn.textContent=editMode?'👁 Lihat':'✏️ Edit';
  btn.className='ebtn'+(editMode?'':' off');
  sbtn.className='sbtn'+(editMode?' show':'');
  est.textContent=editMode?'Mode edit aktif':'Mode lihat';
  document.querySelectorAll('[contenteditable]').forEach(el=>{
    el.contentEditable=editMode?'true':'false';
  });
}

function saveData(){
  // Save checklist state
  const checks={};
  document.querySelectorAll('.check-item input').forEach(cb=>{
    checks[cb.id]=cb.checked;
  });
  // Save notes
  const notes={};
  document.querySelectorAll('.note-box').forEach(nb=>{
    if(nb.value) notes[nb.dataset.key]=nb.value;
  });
  localStorage.setItem('tw2026_checks', JSON.stringify(checks));
  localStorage.setItem('tw2026_notes', JSON.stringify(notes));
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function loadSaved(){
  try{
    const checks=JSON.parse(localStorage.getItem('tw2026_checks')||'{}');
    Object.entries(checks).forEach(([id,val])=>{
      const el=document.getElementById(id);
      if(el){el.checked=val; updateCheckStyle(el);}
    });
    const notes=JSON.parse(localStorage.getItem('tw2026_notes')||'{}');
    Object.entries(notes).forEach(([key,val])=>{
      const el=document.querySelector(`.note-box[data-key="${key}"]`);
      if(el){el.value=val; autoResize(el);}
    });
    updateProgress();
  }catch(e){}
}

function updateCheckStyle(cb){
  const label=cb.closest('.check-item').querySelector('.check-label');
  if(cb.checked) label.classList.add('done');
  else label.classList.remove('done');
  updateProgress();
}

function updateProgress(){
  const all=document.querySelectorAll('.check-item input');
  const done=document.querySelectorAll('.check-item input:checked');
  const pct=all.length?Math.round(done.length/all.length*100):0;
  const fill=document.getElementById('prog-fill');
  const lbl=document.getElementById('prog-lbl');
  if(fill) fill.style.width=pct+'%';
  if(lbl) lbl.textContent=`${done.length} dari ${all.length} selesai (${pct}%)`;
}

function autoResize(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}

function toggleNote(key){
  const nb=document.querySelector(`.note-box[data-key="${key}"]`);
  if(nb){
    nb.style.display=nb.style.display==='none'?'block':'none';
    if(nb.style.display==='block') nb.focus();
  }
}

function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  event.target.classList.add('active');
}

// Add note boxes to timeline items after render
document.querySelectorAll('.tr').forEach((tr,i)=>{
  const key='note-'+i;
  const toggle=document.createElement('div');
  toggle.className='note-toggle';
  toggle.innerHTML='📝 Tambah catatan';
  toggle.onclick=(e)=>{e.stopPropagation();toggleNote(key)};

  const nb=document.createElement('textarea');
  nb.className='note-box';
  nb.dataset.key=key;
  nb.placeholder='Tulis catatan di sini...';
  nb.style.display='none';
  nb.oninput=()=>{autoResize(nb);saveData()};

  tr.appendChild(toggle);
  tr.appendChild(nb);
});
