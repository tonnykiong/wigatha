<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0F1117;
    --bg2: #181C26;
    --bg3: #1E2330;
    --border: #2A2F3E;
    --text: #E8EAF0;
    --text2: #9AA0B4;
    --text3: #5C6278;
    --teal: #2DD4A0;
    --teal-dim: #193D2F;
    --blue: #5B9EF0;
    --blue-dim: #1A2740;
    --amber: #F0B429;
    --amber-dim: #2A200A;
    --coral: #F06B5B;
    --coral-dim: #2A1510;
    --purple: #9B8EF0;
    --purple-dim: #1E1B35;
    --green: #6DBF67;
    --green-dim: #182418;
    --gray: #6B7280;
    --gray-dim: #1A1D22;
    --food: #F0B429;
    --warn: #F06B5B;
    --tip: #2DD4A0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* Header */
  .hero {
    padding: 40px 20px 32px;
    max-width: 720px;
    margin: 0 auto;
  }
  .hero h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .hero p { font-size: 14px; color: var(--text2); margin-top: 4px; }

  .flight-chips {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px;
  }
  .chip {
    font-size: 12px; padding: 5px 12px;
    border-radius: 20px; border: 1px solid var(--border);
    color: var(--text2); background: var(--bg2);
    white-space: nowrap;
  }
  .chip.blue { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
  .chip.amber { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }

  /* Days container */
  .days { max-width: 720px; margin: 0 auto; padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

  .day-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .day-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }
  .day-head:hover { background: var(--bg3); }

  .day-num {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
  }

  .day-meta { flex: 1; }
  .day-meta h3 { font-size: 15px; font-weight: 600; }
  .day-meta p { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .day-chevron { font-size: 11px; color: var(--text3); transition: transform .2s; }
  .day-card.open .day-chevron { transform: rotate(180deg); }

  .day-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 16px;
  }
  .day-card.open .day-body { display: block; }

  /* Meals */
  .meal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 8px; margin-bottom: 16px; }
  .meal-box {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px;
  }
  .meal-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 3px; }
  .meal-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .meal-desc { font-size: 11px; color: var(--text2); margin-top: 2px; line-height: 1.4; }

  /* Editable */
  [contenteditable] { outline: none; cursor: text; }
  [contenteditable]:hover { background: rgba(255,255,255,.04); border-radius: 4px; }
  [contenteditable]:focus { background: rgba(255,255,255,.06); border-radius: 4px; box-shadow: 0 0 0 1px rgba(93,158,240,.4); }

  /* Section label */
  .sec-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 10px; }

  /* Timeline */
  .tl { display: flex; flex-direction: column; }
  .tl-item { display: flex; gap: 10px; }
  .tl-l { display: flex; flex-direction: column; align-items: center; width: 44px; flex-shrink: 0; }
  .tl-time { font-size: 10px; color: var(--text3); font-weight: 600; text-align: center; padding-top: 2px; line-height: 1.2; }
  .tl-dot { width: 8px; height: 8px; border-radius: 50%; margin: 4px 0; flex-shrink: 0; }
  .tl-line { flex: 1; width: 1px; background: var(--border); }
  .tl-r { flex: 1; padding-bottom: 14px; }
  .tl-place { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .tl-desc { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.5; }
  .tips { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .tip { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: var(--bg3); line-height: 1.4; }
  .tip.food { border-left: 2px solid var(--food); color: var(--food); }
  .tip.warn { border-left: 2px solid var(--warn); color: #f09080; }
  .tip.info { border-left: 2px solid var(--tip); color: var(--tip); }

  /* Edit mode bar */
  .edit-bar {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 30px; padding: 8px 16px;
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; color: var(--text2);
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    z-index: 100;
  }
  .edit-toggle {
    padding: 5px 14px; border-radius: 20px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 600; transition: all .15s;
    background: var(--teal); color: #0F1117;
  }
  .edit-toggle.off { background: var(--border); color: var(--text2); }

  .save-btn {
    padding: 5px 14px; border-radius: 20px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 600;
    background: var(--blue); color: white;
    display: none;
  }
  .save-btn.show { display: inline-block; }

  /* Saved toast */
  .toast {
    position: fixed; top: 20px; right: 20px;
    background: var(--teal); color: #0F1117;
    padding: 8px 18px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transform: translateY(-8px);
    transition: all .3s; pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 480px) {
    .hero h1 { font-size: 22px; }
    .meal-grid { grid-template-columns: 1fr 1fr; }
  }
</style>

function loadData() {
  try {
    const saved = localStorage.getItem('tw2026');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return DATA;
}

function saveData() {
  const data = collectCurrentData();
  localStorage.setItem('tw2026', JSON.stringify(data));
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function collectCurrentData() {
  // Collect edited content from DOM
  const days = [];
  document.querySelectorAll('.day-card').forEach((card, i) => {
    const orig = loadedData.days[i];
    const meals = [];
    card.querySelectorAll('.meal-box').forEach((mb, j) => {
      meals.push([
        orig.meals[j][0],
        mb.querySelector('.meal-name').textContent,
        mb.querySelector('.meal-desc').textContent,
      ]);
    });
    const tl = [];
    card.querySelectorAll('.tl-item').forEach((ti, j) => {
      const tipEls = ti.querySelectorAll('.tip');
      const tips = [];
      tipEls.forEach((te, k) => {
        tips.push({ txt: te.textContent, type: orig.tl[j]?.tips[k]?.type || 'info' });
      });
      tl.push({
        t: orig.tl[j]?.t || '',
        p: ti.querySelector('.tl-place').textContent,
        d: ti.querySelector('.tl-desc')?.textContent || '',
        tips,
      });
    });
    days.push({ ...orig, meals, tl });
  });
  return { days };
}

let loadedData = loadData();

function render(data) {
  const container = document.getElementById('days');
  container.innerHTML = '';
  data.days.forEach((day, i) => {
    const col = COLORS[day.c] || COLORS.gray;
    const card = document.createElement('div');
    card.className = 'day-card';

    // Header
    card.innerHTML = `
      <div class="day-head" onclick="toggleDay(this)">
        <div class="day-num" style="background:${col.bg};color:${col.dot}">D${day.n}</div>
        <div class="day-meta">
          <h3>${day.date} — <span contenteditable="false">${day.label}</span></h3>
          <p>${day.tl[0]?.p || ''}</p>
        </div>
        <span class="day-chevron">▼</span>
      </div>
      <div class="day-body">
        <div class="sec-lbl">Makan hari ini</div>
        <div class="meal-grid">${day.meals.map(m => `
          <div class="meal-box">
            <div class="meal-label">${m[0]}</div>
            <div class="meal-name" contenteditable="false">${m[1]}</div>
            <div class="meal-desc" contenteditable="false">${m[2]}</div>
          </div>`).join('')}
        </div>
        <div class="sec-lbl" style="margin-top:4px">Jadwal harian</div>
        <div class="tl">${day.tl.map((item, idx) => {
          const isLast = idx === day.tl.length - 1;
          const tips = item.tips.map(t => `<div class="tip ${t.type}" contenteditable="false">${t.txt}</div>`).join('');
          return `<div class="tl-item">
            <div class="tl-l">
              <div class="tl-time">${item.t}</div>
              <div class="tl-dot" style="background:${col.dot}"></div>
              ${!isLast ? '<div class="tl-line"></div>' : ''}
            </div>
            <div class="tl-r">
              <div class="tl-place" contenteditable="false">${item.p}</div>
              ${item.d ? `<div class="tl-desc" contenteditable="false">${item.d}</div>` : ''}
              ${tips ? `<div class="tips">${tips}</div>` : ''}
            </div>
          </div>`;
        }).join('')}</div>
      </div>`;

    container.appendChild(card);
  });

  // Open first day
  document.querySelector('.day-card')?.classList.add('open');
}

function toggleDay(head) {
  const card = head.closest('.day-card');
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('open'));
  if (!wasOpen) card.classList.add('open');
}

function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById('editBtn');
  const saveBtn = document.getElementById('saveBtn');
  const status = document.getElementById('edit-status');

  btn.textContent = editMode ? '👁 Lihat' : '✏️ Edit';
  btn.className = 'edit-toggle' + (editMode ? '' : ' off');
  saveBtn.className = 'save-btn' + (editMode ? ' show' : '');
  status.textContent = editMode ? 'Mode edit aktif' : 'Mode lihat';

  document.querySelectorAll('[contenteditable]').forEach(el => {
    el.contentEditable = editMode ? 'true' : 'false';
  });
}

render(loadedData);
</script>
